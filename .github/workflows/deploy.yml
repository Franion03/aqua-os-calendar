name: Deploy

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run tests
        run: dotnet test AquaOs.Calendar.sln --configuration Release

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image (linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: PublishGameCalendar/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE,ECR_REGISTRY,JWT_KEY,ADMIN_USERNAME,ADMIN_PASSWORD
          script: |
            aws ecr get-login-password --region eu-west-1 \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            docker pull "$IMAGE"

            docker stop aqua-os-calendar 2>/dev/null || true
            docker rm   aqua-os-calendar 2>/dev/null || true

            docker run -d \
              --name aqua-os-calendar \
              --restart unless-stopped \
              -p 8082:8082 \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e ASPNETCORE_URLS=http://+:8082 \
              -e AWS__Region=eu-west-1 \
              -e "Jwt__Key=$JWT_KEY" \
              -e Jwt__Issuer=AquaOsCalendar \
              -e Jwt__Audience=AquaOsCalendar \
              -e "Admin__Username=$ADMIN_USERNAME" \
              -e "Admin__Password=$ADMIN_PASSWORD" \
              -e IcsFilesPath=/data/ics \
              -v /mnt/data:/data/ics \
              "$IMAGE"

            docker image prune -f